name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"
  DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/bbs?schema=public"
  REDIS_URL: "redis://127.0.0.1:6379"
  SESSION_SECRET: "ci-session-secret-for-build-only"
  CAPTCHA_SECRET_KEY: "ci-captcha-secret-for-build-only"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm run prisma:generate

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
